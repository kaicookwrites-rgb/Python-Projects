<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compact Colorful Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator-container" role="application" aria-label="Calculator">
    <output class="screen" id="screen" aria-live="polite">0</output>
    <div class="buttons">
      <button class="btn special" data-action="clear">C</button>
      <button class="btn special" data-action="negate">±</button>
      <button class="btn special" data-action="percent">%</button>
      <button class="btn op" data-action="divide">÷</button>

      <button class="btn" data-digit="7">7</button>
      <button class="btn" data-digit="8">8</button>
      <button class="btn" data-digit="9">9</button>
      <button class="btn op" data-action="multiply">×</button>

      <button class="btn" data-digit="4">4</button>
      <button class="btn" data-digit="5">5</button>
      <button class="btn" data-digit="6">6</button>
      <button class="btn op" data-action="subtract">−</button>

      <button class="btn" data-digit="1">1</button>
      <button class="btn" data-digit="2">2</button>
      <button class="btn" data-digit="3">3</button>
      <button class="btn op" data-action="add">+</button>

      <button class="btn zero" data-digit="0">0</button>
      <button class="btn" data-digit=".">.</button>
      <button class="btn equal" data-action="equal">=</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
